services:
  - type: web
    name: deepinsight-api
    env: docker
    region: ohio
    rootDir: backend
    dockerfilePath: Dockerfile
    healthCheckPath: /health
    autoDeploy: true
    disk:
      name: sqlite-data
      mountPath: /app/data
      sizeGB: 1
    envVars:
      - key: DATABASE_URL
        value: sqlite+aiosqlite:////app/data/deep_insight.db
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
